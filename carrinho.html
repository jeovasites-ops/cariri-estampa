<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Minha Sacola | Cariri Estampa</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./assets/css/main.css">
    <link rel="stylesheet" href="./assets/css/theme-default.css">

    <style>
        :root {
            --red: #E53E3E; --green: #38A169;
            --gray-900: #1A202C; --gray-700: #4A5568;
            --gray-400: #A0AEC0; --gray-100: #F7FAFC;
            --radius-pill: 999px;
        }

        body { background: #F7FAFC; }

        /* Header */
        .cart-page-header {
            background: #fff;
            border-bottom: 1px solid #EDF2F7;
            padding: 0 16px;
            height: 56px;
            display: flex;
            align-items: center;
            gap: 16px;
            position: sticky;
            top: 0;
            z-index: 500;
        }
        .back-btn {
            width: 36px; height: 36px;
            border: none; background: #F7FAFC;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; color: var(--gray-700);
            cursor: pointer; text-decoration: none;
            flex-shrink: 0;
        }
        .page-title {
            font-family: 'Bricolage Grotesque', sans-serif;
            font-weight: 800;
            font-size: 1.15rem;
            color: var(--gray-900);
            margin: 0;
        }

        /* Lista de itens */
        .cart-list {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .cart-item {
            background: #fff;
            border-radius: 20px;
            padding: 14px;
            display: flex;
            gap: 14px;
            border: 1px solid #EDF2F7;
        }
        .cart-item-img {
            width: 72px; height: 72px;
            border-radius: 14px;
            object-fit: cover;
            flex-shrink: 0;
            background: #EDF2F7;
        }
        .cart-item-info { flex: 1; min-width: 0; }
        .cart-item-name {
            font-weight: 700;
            font-size: .92rem;
            color: var(--gray-900);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .cart-item-price {
            font-family: 'Bricolage Grotesque', sans-serif;
            font-weight: 800;
            font-size: 1rem;
            color: var(--red);
        }
        .cart-item-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 10px;
        }
        .qty-control {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #F7FAFC;
            border-radius: var(--radius-pill);
            padding: 6px 14px;
        }
        .qty-btn {
            width: 28px; height: 28px;
            border: none; background: transparent;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: .9rem;
            color: var(--gray-700); cursor: pointer;
            transition: background .2s;
        }
        .qty-btn:hover { background: #EDF2F7; }
        .qty-num {
            font-weight: 700;
            font-size: .95rem;
            color: var(--gray-900);
            min-width: 20px;
            text-align: center;
        }
        .remove-btn {
            border: none; background: transparent;
            color: var(--gray-400); cursor: pointer;
            font-size: 1.1rem;
            padding: 4px;
            transition: color .2s;
        }
        .remove-btn:hover { color: var(--red); }

        /* Estado vazio */
        .cart-empty {
            display: none;
            text-align: center;
            padding: 80px 24px;
        }
        .cart-empty i {
            font-size: 4rem;
            color: #E2E8F0;
            display: block;
            margin-bottom: 16px;
        }
        .cart-empty p {
            color: var(--gray-400);
            font-size: 1rem;
            margin-bottom: 24px;
        }
        .btn-ver-produtos {
            display: inline-block;
            background: var(--red);
            color: #fff;
            font-weight: 700;
            padding: 14px 32px;
            border-radius: var(--radius-pill);
            text-decoration: none;
        }

        /* Rodapé de checkout (fixo no fundo) */
        .checkout-footer {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: #fff;
            border-top: 1px solid #EDF2F7;
            padding: 16px;
            z-index: 800;
            box-shadow: 0 -8px 24px rgba(0,0,0,.07);
        }
        .checkout-total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }
        .checkout-total-label { font-size: .88rem; color: var(--gray-400); }
        .checkout-total-val {
            font-family: 'Bricolage Grotesque', sans-serif;
            font-weight: 800;
            font-size: 1.4rem;
            color: var(--gray-900);
        }
        .btn-checkout {
            width: 100%;
            background: #25D366;
            color: #fff;
            border: none;
            border-radius: var(--radius-pill);
            padding: 16px;
            font-family: 'Bricolage Grotesque', sans-serif;
            font-weight: 700;
            font-size: 1.05rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(37,211,102,.35);
            transition: transform .2s, box-shadow .2s;
        }
        .btn-checkout:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 30px rgba(37,211,102,.45);
        }
        .btn-checkout i { font-size: 1.4rem; }

        /* Espaço para o footer de checkout não cobrir o conteúdo */
        .checkout-spacer { height: 130px; }

        /* Se tiver floating nav mobile, sobe o checkout footer */
        @media (max-width: 991px) {
            .checkout-footer {
                bottom: calc(64px + 12px);
            }
            .checkout-spacer { height: 200px; }
        }
    </style>
</head>
<body>

    <!-- HEADER OFICIAL UNIFICADO -->
    <header class="header-app">
        <div class="container d-flex justify-content-between align-items-center h-100">
            <!-- Bloco Esquerdo: Logo + Links (Navegação Principal) -->
            <div class="d-flex align-items-center gap-4">
                <a href="index.html" class="d-flex align-items-center text-decoration-none" aria-label="Home">
                    <img src="./logo.svg" alt="Cariri Estampa" class="logo-img-h">
                </a>
                <nav class="d-none d-lg-flex gap-4 align-items-center mb-0">
                    <a href="index.html" class="nav-link-desk">Início</a>
                    <a href="loja.html"    class="nav-link-desk">Loja</a>
                    <a href="sobre.html"   class="nav-link-desk">Sobre</a>
                    <a href="blog.html"    class="nav-link-desk">Blog</a>
                    <a href="contato.html" class="nav-link-desk">Contato</a>
                </nav>
            </div>
            
            <!-- Direita: Ações Sociais -->
            <div class="d-flex align-items-center gap-1">
                <a href="https://instagram.com/caririestampa" target="_blank" class="icon-btn" aria-label="Instagram">
                    <i class="ph ph-instagram-logo"></i>
                </a>
                <a href="carrinho.html" class="icon-btn active" aria-label="Carrinho">
                    <i class="ph ph-shopping-bag"></i>
                </a>
            </div>
        </div>
    </header>

    <main class="cart-main py-4">
        <div class="container">
            <div class="section-header mb-4">
                <div>
                    <span class="section-tag">Carrinho</span>
                    <h2 class="section-title">Minha Sacola</h2>
                </div>
            </div>

            <!-- Lista de itens -->
            <div class="cart-list" id="cart-list">
                <!-- Injetado via JS -->
            </div>

            <!-- Estado vazio -->
            <div class="cart-empty" id="cart-empty">
                <i class="ph ph-shopping-bag-open"></i>
                <p>Sua sacola está vazia.<br><span style="font-size:.85rem;">Adicione produtos pelo catálogo</span></p>
                <a href="loja.html" class="btn-ver-produtos">Ver Produtos</a>
            </div>

            <div class="checkout-spacer"></div>
        </div>
    </main>

    <!-- Rodapé de Checkout -->
    <div class="checkout-footer" id="cart-checkout" style="display:none;">
        <div class="checkout-total-row">
            <span class="checkout-total-label">Total Estimado</span>
            <span class="checkout-total-val" id="cart-total">R$ 0,00</span>
        </div>
        <button class="btn-checkout" onclick="checkoutWhatsApp()">
            <i class="ph-fill ph-whatsapp-logo"></i>
            Finalizar no WhatsApp
        </button>
    </div>

    <!-- Floating Island Nav -->
    <nav class="mobile-nav" role="navigation">
        <a href="index.html" class="nav-item">
            <i class="ph ph-house-simple"></i><span>Início</span>
        </a>
        <a href="loja.html" class="nav-item">
            <i class="ph ph-storefront"></i><span>Loja</span>
        </a>
        <a href="carrinho.html" class="nav-item nav-center active">
            <div class="nav-center-icon">
                <i class="ph-fill ph-shopping-bag"></i>
                <span class="nav-center-badge" id="nav-cart-count">0</span>
            </div>
            <span>Sacola</span>
        </a>
        <a href="sobre.html" class="nav-item">
            <i class="ph ph-user-circle"></i><span>Sobre</span>
        </a>
        <a href="blog.html" class="nav-item">
            <i class="ph ph-article"></i><span>Blog</span>
        </a>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="./assets/js/core.js"></script>
    <script>
        function renderCart() {
            const list     = document.getElementById('cart-list');
            const empty    = document.getElementById('cart-empty');
            const checkout = document.getElementById('cart-checkout');
            const totalEl  = document.getElementById('cart-total');

            list.innerHTML = '';

            if (!APP.cart || APP.cart.length === 0) {
                empty.style.display    = 'block';
                checkout.style.display = 'none';
                return;
            }

            empty.style.display    = 'none';
            checkout.style.display = 'block';

            let subtotal = 0;
            APP.cart.forEach((item, index) => {
                subtotal += item.preco * item.qty;
                const el = document.createElement('div');
                el.className = 'cart-item';
                el.innerHTML = `
                    <img src="${item.imagem}" class="cart-item-img" alt="${item.nome}" onerror="this.src='https://via.placeholder.com/72'">
                    <div class="cart-item-info">
                        <div class="cart-item-name">${item.nome}</div>
                        <div class="cart-item-price">${APP.formatMoney(item.preco)}</div>
                        <div class="cart-item-controls">
                            <div class="qty-control">
                                <button class="qty-btn" onclick="updateQty(${index}, -1)"><i class="ph-bold ph-minus"></i></button>
                                <span class="qty-num">${item.qty}</span>
                                <button class="qty-btn" onclick="updateQty(${index}, 1)"><i class="ph-bold ph-plus"></i></button>
                            </div>
                            <button class="remove-btn" onclick="removeItem(${index})" title="Remover">
                                <i class="ph ph-trash"></i>
                            </button>
                        </div>
                    </div>
                `;
                list.appendChild(el);
            });

            totalEl.textContent = APP.formatMoney(subtotal);

            // Atualiza badge
            const total = APP.cart.reduce((s, i) => s + i.qty, 0);
            const badge = document.getElementById('nav-cart-count');
            if (badge) badge.textContent = total;
        }

        function updateQty(index, mod) {
            if (!APP.cart[index]) return;
            APP.cart[index].qty = Math.max(1, APP.cart[index].qty + mod);
            APP.saveCart();
            renderCart();
        }

        function removeItem(index) {
            APP.cart.splice(index, 1);
            APP.saveCart();
            renderCart();
        }

        function checkoutWhatsApp() {
            const link = APP.generateWhatsAppLink();
            if (link) window.open(link, '_blank');
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Aguarda APP estar pronto
            setTimeout(renderCart, 100);
        });
    </script>
</body>
</html>
